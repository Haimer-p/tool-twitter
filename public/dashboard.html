<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter Bot Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header, .stat-card, .chart-container, .activities, .control-panel {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .header h1 { color: #333; font-size: 28px; }
    .header p { color: #666; font-size: 14px; margin-top: 5px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-card { text-align: center; transition: transform 0.3s; }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-card .icon { font-size: 40px; margin-bottom: 10px; }
    .stat-card .value { font-size: 36px; font-weight: bold; color: #333; }
    .stat-card .label { color: #666; font-size: 14px; margin-top: 5px; }
    .chart-container h3, .activities h3 { margin-bottom: 20px; color: #333; }
    .activity-list { max-height: 400px; overflow-y: auto; }
    .activity-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .activity-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; background: #f0f0f0;
    }
    .activity-details { flex: 1; }
    .activity-action { font-weight: 600; color: #333; }
    .activity-target { color: #666; font-size: 12px; margin-top: 4px; word-break: break-all; }
    .activity-time { color: #999; font-size: 12px; }
    .control-panel { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center; }
    .mode-select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
    .btn {
      padding: 12px 30px; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .btn-start { background: #2ecc71; color: white; }
    .btn-stop { background: #e74c3c; color: white; }
    .refresh-time { font-size: 12px; color: #999; text-align: center; margin-top: 10px; }
    .auth-box { margin-top: 10px; }
    .auth-box input { padding: 8px; margin-right: 8px; border: 1px solid #ddd; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Twitter Bot Dashboard</h1>
      <p>Giám sát và điều khiển bot tương tác Twitter/X</p>
      <p id="botModeInfo" style="color:#555;font-size:14px;margin-top:8px">Mode: --</p>
      <div id="accountJobsList" style="font-size:13px;color:#666;margin-top:8px;max-height:120px;overflow-y:auto"></div>
      <div class="auth-box" id="authBox">
        <input type="text" id="authUser" placeholder="Username" value="admin">
        <input type="password" id="authPass" placeholder="Password" value="admin123">
        <button class="btn btn-start" onclick="saveAuth()">Lưu đăng nhập & tải dữ liệu</button>
        <button class="btn btn-stop" style="background:#3498db" onclick="initialFetch()">Làm mới</button>
      </div>
      <p style="color:#888;font-size:13px;margin-top:8px">Bấm nút xanh. Port theo .env (vd: http://localhost:3001).</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="icon">❤️</div><div class="value" id="totalLikes">0</div><div class="label">Likes</div></div>
      <div class="stat-card"><div class="icon">🔄</div><div class="value" id="totalRetweets">0</div><div class="label">Retweets</div></div>
      <div class="stat-card"><div class="icon">💬</div><div class="value" id="totalReplies">0</div><div class="label">Replies</div></div>
      <div class="stat-card"><div class="icon">➕</div><div class="value" id="totalFollows">0</div><div class="label">Follows</div></div>
    </div>

    <div class="chart-container">
      <h3>Thống kê theo ngày</h3>
      <canvas id="interactionChart"></canvas>
    </div>

    <div class="activities">
      <h3>Hoạt động gần đây</h3>
      <div class="activity-list" id="activityList">Đang tải...</div>
    </div>

    <div class="control-panel">
      <select id="botMode" class="mode-select">
        <option value="engage">Engage (cũ)</option>
        <option value="airdrop">Airdrop Hunter</option>
      </select>
      <select id="commentMode" class="mode-select">
        <option value="rule">Rule (không AI)</option>
        <option value="ai">AI (Gemini)</option>
      </select>
      <button class="btn btn-start" style="background:#9b59b6" onclick="loadProfiles()">Tải profiles</button>
      <button class="btn btn-start" onclick="controlBot('start')">Chạy tất cả (song song)</button>
      <button class="btn btn-stop" onclick="controlBot('stop')">Dừng bot</button>
    </div>
    <div class="refresh-time" id="refreshTime">Cập nhật: --</div>
  </div>

  <script>
    let interactionChart = null;
    let socket = null;

    function getAuthHeader() {
      const user = sessionStorage.getItem('dashUser') || document.getElementById('authUser').value;
      const pass = sessionStorage.getItem('dashPass') || document.getElementById('authPass').value;
      return 'Basic ' + btoa(user + ':' + pass);
    }

    function saveAuth() {
      sessionStorage.setItem('dashUser', document.getElementById('authUser').value);
      sessionStorage.setItem('dashPass', document.getElementById('authPass').value);
      initialFetch();
      initSocket();
    }

    async function apiFetch(url) {
      const res = await fetch(url, { headers: { Authorization: getAuthHeader() } });
      if (res.status === 401) throw new Error('Unauthorized');
      return res.json();
    }

    function initChart() {
      const ctx = document.getElementById('interactionChart').getContext('2d');
      interactionChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            { label: 'Likes', data: [], borderColor: '#e74c3c', tension: 0.4 },
            { label: 'Retweets', data: [], borderColor: '#2ecc71', tension: 0.4 },
            { label: 'Replies', data: [], borderColor: '#3498db', tension: 0.4 },
            { label: 'Follows', data: [], borderColor: '#9b59b6', tension: 0.4 },
          ],
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } },
      });
    }

    function getActionIcon(action) {
      return { like: '❤️', retweet: '🔄', reply: '💬', follow: '➕', unfollow: '➖', login: '🔐', error: '⚠️' }[action] || '📝';
    }

    function formatTime(timestamp) {
      if (!timestamp) return '--';
      return new Date(timestamp).toLocaleString('vi-VN');
    }

    function updateDashboard(data) {
      document.getElementById('totalLikes').textContent = data.stats?.likes || 0;
      document.getElementById('totalRetweets').textContent = data.stats?.retweets || 0;
      document.getElementById('totalReplies').textContent = data.stats?.replies || 0;
      document.getElementById('totalFollows').textContent = data.stats?.follows || 0;

      if (data.chartData && interactionChart) {
        const reversed = [...data.chartData].reverse();
        interactionChart.data.labels = reversed.map((d) => d.date);
        interactionChart.data.datasets[0].data = reversed.map((d) => d.likes || 0);
        interactionChart.data.datasets[1].data = reversed.map((d) => d.retweets || 0);
        interactionChart.data.datasets[2].data = reversed.map((d) => d.replies || 0);
        interactionChart.data.datasets[3].data = reversed.map((d) => d.follows || 0);
        interactionChart.update();
      }

      const list = document.getElementById('activityList');
      const acts = data.recentActivities || [];
      if (!acts.length) {
        list.innerHTML = '<div style="text-align:center;padding:20px;color:#999">Chưa có hoạt động</div>';
      } else {
        list.innerHTML = acts.map((a) => `
          <div class="activity-item">
            <div class="activity-icon">${getActionIcon(a.action)}</div>
            <div class="activity-details">
              <div class="activity-action">${a.accountName} · ${a.action} ${a.success ? '✅' : '❌'}</div>
              <div class="activity-target">${a.target || 'N/A'}</div>
            </div>
            <div class="activity-time">${formatTime(a.timestamp)}</div>
          </div>
        `).join('');
      }
      document.getElementById('refreshTime').textContent = 'Cập nhật: ' + formatTime(data.timestamp);
    }

    let cachedProfiles = null;

    function renderAccountJobs(jobs) {
      const el = document.getElementById('accountJobsList');
      if (!jobs?.length) {
        el.innerHTML = '<span>Chưa có cấu hình account — bấm "Tải profiles"</span>';
        return;
      }
      el.innerHTML = jobs.map((j) =>
        `<div>• <b>${j.accountName}</b>: ${j.mode}${j.mode === 'airdrop' ? ` (${j.useAi ? 'AI' : 'Rule'})` : ''} — ${(j.keywords || []).slice(0, 2).join(', ')}</div>`
      ).join('');
    }

    async function loadProfiles() {
      try {
        cachedProfiles = await apiFetch('/api/account-profiles');
        const accounts = await apiFetch('/api/accounts');
        const profileMap = new Map((cachedProfiles.accounts || []).map((a) => [a.name, a]));
        const jobs = (accounts.accounts || []).map((name) => {
          const p = profileMap.get(name) || {};
          if (p.enabled === false) return null;
          return {
            accountName: name,
            mode: p.mode || document.getElementById('botMode').value,
            useAi: p.useAi ?? (document.getElementById('commentMode').value === 'ai'),
            keywords: p.keywords?.length ? p.keywords : ['airdrop'],
          };
        }).filter(Boolean);
        renderAccountJobs(jobs);
        window._pendingJobs = jobs;
        window._maxParallel = cachedProfiles.maxParallel || 3;
      } catch (e) {
        alert('Không tải được profiles. Kiểm tra accounts/accounts.config.json');
      }
    }

    function updateModeDisplay(status) {
      const mode = status?.mode || 'engage';
      const commentMode = status?.commentMode || (status?.useAi ? 'ai' : 'rule');
      const running = status?.running ? ' (đang chạy)' : '';
      const jobs = status?.accountJobs || [];
      let label =
        mode === 'multi'
          ? `Multi-account (${jobs.length} acc)`
          : mode === 'airdrop'
            ? `Airdrop · ${commentMode === 'ai' ? 'AI' : 'Rule'}`
            : 'Engage';
      document.getElementById('botModeInfo').textContent = `Mode: ${label}${running}`;
      if (jobs.length) renderAccountJobs(jobs);
      if (mode !== 'multi') {
        document.getElementById('botMode').value = mode === 'multi' ? 'engage' : mode;
      }
      document.getElementById('commentMode').value = commentMode;
      document.getElementById('commentMode').disabled =
        mode !== 'airdrop' && mode !== 'multi';
    }

    async function fetchStatus() {
      try {
        const status = await apiFetch('/api/status');
        updateModeDisplay(status);
      } catch (_) {}
    }

    async function controlBot(action) {
      const body = {};
      if (action === 'start') {
        if (window._pendingJobs?.length) {
          body.accountJobs = window._pendingJobs;
          body.maxParallel = window._maxParallel || 3;
        } else {
          body.mode = document.getElementById('botMode').value;
          body.useAi = document.getElementById('commentMode').value === 'ai';
        }
      }
      await fetch('/api/control/' + action, {
        method: 'POST',
        headers: { Authorization: getAuthHeader(), 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (action === 'start') fetchStatus();
    }

    document.getElementById('botMode').addEventListener('change', (e) => {
      document.getElementById('commentMode').disabled = e.target.value !== 'airdrop';
    });

    function initSocket() {
      if (socket) socket.disconnect();
      socket = io();
      socket.on('stats-update', updateDashboard);
    }

    async function initialFetch() {
      try {
        const stats = await apiFetch('/api/stats');
        const activities = await apiFetch('/api/activities?limit=20');
        await fetchStatus();
        updateDashboard({ stats: stats.totals, chartData: stats.stats, recentActivities: activities, timestamp: new Date() });
      } catch (e) {
        document.getElementById('activityList').innerHTML = '<div style="color:#c0392b;padding:20px">Cần đăng nhập đúng user/password (mặc định admin / admin123)</div>';
      }
    }

    initChart();
    if (sessionStorage.getItem('dashPass')) {
      initialFetch();
      initSocket();
    }
  </script>
</body>
</html>
